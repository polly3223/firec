# Lima VM config for running Firecracker microVMs on macOS
# Requires Apple Silicon + macOS 13+ for nested virtualization
vmType: vz
nestedVirtualization: true

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "4GiB"
disk: "20GiB"

mounts: []

containerd:
  system: false
  user: false
